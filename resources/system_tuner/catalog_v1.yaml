tweaks:
  - id: "TW-TEL-001"
    title_de: "Windows-Telemetrie auf Minimum (Erforderlich)"
    category: "telemetry"
    risk_tier: "T1_safe"
    recommend: "standard"
    rationale_de: >-
      Setzt die Diagnosedaten-Stufe ueber den dokumentierten Microsoft-Pfad
      (AllowTelemetry) auf 'Erforderlich (1)'. Reduziert optionale Telemetrie,
      ohne Update-/Sicherheits-relevante Diagnose zu unterbinden.
    docs_url: "https://learn.microsoft.com/windows/client-management/mdm/policy-csp-system"
    edition_caveat: "telemetry_zero_enterprise_only"
    requires_admin: true
    requires_reboot: false
    compliance_relevance:
      - "Unterstuetzt DSGVO Art. 32 (TOM): reduziert Uebermittlung optionaler Diagnosedaten"
      - "Unterstuetzt DSGVO Art. 5 Abs. 1 lit. c (Datenminimierung)"
    provenance:
      source: "Microsoft Learn — policy-csp-system (AllowTelemetry), 2026-06"
      derived_from: null
      license: null
    change:
      op: "registry_set"
      hive: "HKLM"
      key: "SOFTWARE\\Policies\\Microsoft\\Windows\\DataCollection"
      value_name: "AllowTelemetry"
      value_type: "REG_DWORD"
      desired: 1
    verify:
      expect_value: 1
    revert:
      kind: "restore_prior"

  - id: "TW-TEL-002"
    title_de: "DiagTrack-Autologger beim Start deaktivieren"
    category: "telemetry"
    risk_tier: "T1_safe"
    recommend: "strict"
    rationale_de: >-
      Deaktiviert den ETW-Autologger 'AutoLogger-Diagtrack-Listener' (Start=0),
      der beim Boot Telemetrie-Tracing startet. Voll reversibel ueber den
      gesicherten Vorwert.
    docs_url: "https://learn.microsoft.com/windows/privacy/configure-windows-diagnostic-data-in-your-organization"
    requires_admin: true
    requires_reboot: true
    compliance_relevance:
      - "Unterstuetzt DSGVO Art. 5 Abs. 1 lit. c (Datenminimierung)"
    provenance:
      source: "Microsoft Learn — Diagnostic Data / Autologger-Doku, 2026-06"
      derived_from: null
      license: null
    change:
      op: "registry_set"
      hive: "HKLM"
      key: "SYSTEM\\CurrentControlSet\\Control\\WMI\\Autologger\\AutoLogger-Diagtrack-Listener"
      value_name: "Start"
      value_type: "REG_DWORD"
      desired: 0
    verify:
      expect_value: 0
    revert:
      kind: "restore_prior"

